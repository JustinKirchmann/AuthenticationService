spring:
  application:
    name: auth-service
  datasource:
    url:               ${DB_URL:jdbc:postgresql://localhost:5432/authdb}
    username:          ${DB_USER:postgres}
    password:          ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect:    org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

kurrentdb:
  connection-string: ${KURRENTDB_URL:esdb://localhost:2113?tls=false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${PORT:8080}
